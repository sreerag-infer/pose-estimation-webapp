<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Estimation Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin: 30px 0;
            background: #f8f9ff;
            transition: all 0.3s ease;
        }
        .upload-area:hover { border-color: #764ba2; background: #f0f0ff; }
        input[type="file"] { display: none; }
        .model-selector {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .model-selector > label {
            display: block;
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
        }
        .radio-group { display: flex; gap: 20px; flex-wrap: wrap; }
        .radio-option { display: flex; align-items: center; gap: 8px; }
        .radio-option input[type="radio"] { cursor: pointer; width: 18px; height: 18px; }
        .radio-option label { cursor: pointer; margin: 0; font-weight: normal; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .loading { display: none; text-align: center; margin-top: 20px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-message {
            display: none;
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Pose Estimation</h1>
        <p class="subtitle">Upload an image to detect human pose</p>

        <div class="error-message" id="error-message"></div>

        <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click();">
            <div style="font-size: 3em;">📸</div>
            <p>Click to upload or drag & drop</p>
            <p style="color: #999; font-size: 0.9em;">Supported: JPG, PNG, GIF, BMP (Max 10MB)</p>
        </div>

        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.gif,.bmp" />

        <div class="model-selector">
            <label>Select Model:</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="model-coco" name="model" value="coco">
                    <label for="model-coco">COCO (18 keypoints, detailed)</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="model-mpii" name="model" value="mpii" checked>
                    <label for="model-mpii">MPII (15 keypoints, faster)</label>
                </div>
            </div>
        </div>

        <button onclick="document.getElementById('file-input').click();">Choose Image</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error-message');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#764ba2';
            uploadArea.style.background = '#f0f0ff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = '#f8f9ff';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = '#f8f9ff';
            if (e.dataTransfer.files.length > 0) {
                uploadFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });

        function uploadFile(file) {
            errorDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            const modelType = document.querySelector('input[name="model"]:checked').value;
            formData.append('model', modelType);

            loadingDiv.style.display = 'block';

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.error || 'Upload failed');
                    }).catch(() => {
                        throw new Error('Server error (status ' + response.status + '). The server may have run out of memory processing this image.');
                    });
                }
                return response.json();
            })
            .then(data => {
                loadingDiv.style.display = 'none';
                if (data.success) {
                    sessionStorage.setItem('poseResult', JSON.stringify({
                        image: data.result_image,
                        data: data.data
                    }));
                    window.location.href = '/result.html';
                } else {
                    showError(data.error || 'Processing failed');
                }
            })
            .catch(error => {
                loadingDiv.style.display = 'none';
                showError(error.message);
            });
        }

        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
