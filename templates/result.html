<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Estimation Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .breadcrumb {
            color: #999;
            font-size: 0.9em;
        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .result-image-section {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .result-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-caption {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9em;
            text-align: center;
        }

        .stats-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-card {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .keypoints-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .keypoints-table {
            width: 100%;
            border-collapse: collapse;
        }

        .keypoints-table th {
            background: #f8f9fa;
            color: #333;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }

        .keypoints-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        .keypoints-table tr:hover {
            background: #f8f9ff;
        }

        .confidence-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75em;
            font-weight: 600;
        }

        .model-info {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button, a.button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .keypoint-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            align-items: center;
        }

        .keypoint-name {
            font-weight: 600;
            color: #333;
        }

        .keypoint-coords {
            color: #999;
            font-size: 0.9em;
        }

        footer {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: #999;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .keypoints-table {
                font-size: 0.9em;
            }
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✅ Pose Estimation Results</h1>
            <p class="breadcrumb"><a href="/">← Back to Upload</a></p>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading results...</p>
        </div>

        <div id="results" style="display: none;">
            <div class="content">
                <div class="result-image-section">
                    <img id="result-image" src="" alt="Pose Estimation Result" class="result-image">
                    <div class="image-caption">Pose Detection with Skeleton Overlay</div>
                </div>

                <div class="stats-section">
                    <div id="model-info" class="model-info"></div>

                    <div class="stat-card">
                        <div class="stat-number" id="keypoint-count">0</div>
                        <div class="stat-label">Keypoints Detected</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-number" id="confidence-avg">0%</div>
                        <div class="stat-label">Average Confidence</div>
                    </div>

                    <div class="button-group">
                        <a href="/" class="button btn-primary">📤 Upload Another</a>
                        <button class="btn-secondary" onclick="downloadResult()">📥 Download Image</button>
                    </div>
                </div>
            </div>

            <div class="keypoints-section">
                <h2 class="section-title">🎯 Detected Keypoints</h2>
                <div id="keypoints-list"></div>
            </div>
        </div>

        <div id="error" style="display: none;" class="error-message">
            <strong>❌ Error:</strong> <span id="error-text"></span>
            <br><br>
            <a href="/" class="button btn-primary" style="display: inline-block;">← Go Back</a>
        </div>

        <footer>
            <p>OpenCV Pose Estimation WebApp | Powered by Deep Learning</p>
        </footer>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const resultData = sessionStorage.getItem('poseResult');
            
            if (!resultData) {
                showError('No results found. Please upload an image first.');
                return;
            }

            try {
                const result = JSON.parse(resultData);
                displayResults(result);
                sessionStorage.removeItem('poseResult');
            } catch (error) {
                showError('Failed to load results: ' + error.message);
            }
        });

        function displayResults(result) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            const data = result.data;
            
            // Display image
            document.getElementById('result-image').src = result.image;

            // Display stats
            document.getElementById('keypoint-count').textContent = data.total_detected;

            // Model info
            const modelNames = {
                'coco': 'COCO Model (18 keypoints)',
                'mpii': 'MPII Model (15 keypoints)'
            };
            document.getElementById('model-info').innerHTML = 
                `<strong>Model:</strong> ${modelNames[data.model] || data.model}`;

            // Calculate average confidence
            if (data.keypoints.length > 0) {
                const avgConf = (data.keypoints.reduce((sum, kp) => sum + kp.confidence, 0) / data.keypoints.length * 100).toFixed(1);
                document.getElementById('confidence-avg').textContent = avgConf + '%';
            }

            // Display keypoints
            const keypointsList = document.getElementById('keypoints-list');
            keypointsList.innerHTML = '';

            if (data.keypoints.length === 0) {
                keypointsList.innerHTML = '<p>No keypoints detected in this image.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'keypoints-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Keypoint</th>
                        <th>Coordinates</th>
                        <th>Confidence</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.keypoints.map(kp => `
                        <tr>
                            <td>${kp.name}</td>
                            <td>(${Math.round(kp.x)}, ${Math.round(kp.y)})</td>
                            <td>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${(kp.confidence * 100).toFixed(1)}%">
                                        ${(kp.confidence * 100).toFixed(0)}%
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            keypointsList.appendChild(table);
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-text').textContent = message;
        }

        function downloadResult() {
            const imageSrc = document.getElementById('result-image').src;
            const link = document.createElement('a');
            link.href = imageSrc;
            link.download = 'pose-estimation-result.jpg';
            link.click();
        }
    </script>
</body>
</html>
